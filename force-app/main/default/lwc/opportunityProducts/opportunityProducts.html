<template>
    <lightning-card title={label.OpportunityProducts_Title}>
        <div class="slds-m-around_medium">

            <!-- Message d’erreur global -->
            <template if:true={hasGlobalError}>
                <div class="slds-text-color_error slds-p-bottom_small">
                    {label.OpportunityProducts_Global_Error}
                </div>
            </template>

            <!-- Tableau si des produits existent -->
            <template if:true={hasProducts}>
                <lightning-datatable
                    key-field="oliId"
                    data={products}
                    columns={columns}
                    onrowaction={handleRowAction}>
                </lightning-datatable>
            </template>

            <!-- Message si aucun produit -->
            <template if:false={hasProducts}>
                <div class="slds-p-around_medium slds-text-color_weak">
                    {label.OpportunityProducts_NoLines}<br/>
                    1. {label.OpportunityProducts_Select_Pricebook}<br/>
                    2. {label.OpportunityProducts_Select_Products}
                </div>
            </template>

        </div>
    </lightning-card>
</template>
